$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
# ──────────────────────────────────────────────────────────────────────────────
# Production training job — 4× T4 DDP via torchrun on Standard_NC64as_T4_v3.
# Use this once cluster quota (`Standard NCASv3_T4 Family Cluster Dedicated
# vCPUs`) has been granted in the workspace region.
#
# Submit:
#   az ml job create -f aml/job.cluster.yml --web --stream
# ──────────────────────────────────────────────────────────────────────────────

display_name: modernbert-imo-4gpu-ddp
experiment_name: imo-extractor-experiment
description: ModernBERT-base fine-tuning on 4× T4 with DDP (torchrun).

code: ../
command: >-
  torchrun --nproc_per_node=4 train.py
  --data ${{inputs.training_data}}
  --csv-sep ';'
  --model-name answerdotai/ModernBERT-base
  --output-dir ${{outputs.model_dir}}
  --epochs 15
  --batch-size 8
  --lr 6e-5
  --max-seq-len 2048
  --min-examples 20

environment: azureml:imo-classifier-train-env@latest
compute: azureml:gpu-t4-cluster

# `PyTorch` distribution tells AML to set RANK / WORLD_SIZE / MASTER_ADDR
# correctly for torchrun. process_count_per_instance must match
# --nproc_per_node and the GPU count on the SKU.
distribution:
  type: pytorch
  process_count_per_instance: 4
resources:
  instance_count: 1

inputs:
  training_data:
    type: uri_file
    path: azureml:email-imo-training-data@latest
    mode: ro_mount

outputs:
  model_dir:
    type: uri_folder

environment_variables:
  HF_HOME: /tmp/hf
  NCCL_DEBUG: WARN
  TORCH_NCCL_ASYNC_ERROR_HANDLING: "1"
  MLFLOW_EXPERIMENT_NAME: imo-extractor-experiment

tags:
  model: answerdotai/ModernBERT-base
  task: imo-classification
  dataset: email-imo-training-data
  training: 4-gpu-ddp
